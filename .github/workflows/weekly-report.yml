name: Weekly Discord Report

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * 1"

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      - name: Run report
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          DISCORD_GUILD_ID: ${{ secrets.DISCORD_GUILD_ID }}
          DISCORD_FORUM_CHANNEL_IDS: ${{ secrets.DISCORD_FORUM_CHANNEL_IDS }}
          DISCORD_THREAD_CHANNEL_IDS: ${{ secrets.DISCORD_THREAD_CHANNEL_IDS }}
          DISCORD_TEXT_CHANNEL_IDS: ${{ secrets.DISCORD_TEXT_CHANNEL_IDS }}
          ACTIVE_TOPIC_KEYS: ${{ secrets.ACTIVE_TOPIC_KEYS || 'arena' }}
          ENABLE_FEISHU: ${{ secrets.ENABLE_FEISHU || '0' }}
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_BITABLE_APP_TOKEN: ${{ secrets.FEISHU_BITABLE_APP_TOKEN }}
          FEISHU_BITABLE_TABLE_ID: ${{ secrets.FEISHU_BITABLE_TABLE_ID }}
          FEISHU_RECEIVE_ID_TYPE: ${{ secrets.FEISHU_RECEIVE_ID_TYPE }}
          FEISHU_RECEIVE_ID: ${{ secrets.FEISHU_RECEIVE_ID }}
          FEISHU_CHAT_ID: ${{ secrets.FEISHU_CHAT_ID }}
          TIMEZONE: Asia/Shanghai
          OUTPUT_DIR: .
        run: python -m discord_weekly_report.main
      - name: Upload report artifacts
        uses: actions/upload-artifact@v4
        with:
          name: discord-weekly-report
          path: |
            reports/*.md
            reports/topics/*.md
            data/raw/*.json
            data/analyzed/*.json
            data/topics/*.md
